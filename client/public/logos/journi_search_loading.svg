<svg xmlns="http://www.w3.org/2000/svg"
  width="2000" height="2000"
  viewBox="0 0 1500 1499.999933"
  preserveAspectRatio="xMidYMid meet">

  <style>
    /*
     * 20 keys, 2 purple at a time, clockwise.
     * Each key is purple for the first 10% of its 2s cycle.
     * Negative delays stagger the phase so k0+k19 start purple,
     * then k0+k1, k1+k2, ... moving clockwise.
     */
    @keyframes jkey {
      0%     { fill: #7B71C7; }
      10%    { fill: #7B71C7; }
      10.01% { fill: #4fb151; }
      100%   { fill: #4fb151; }
    }
    .k0  { animation: jkey 2s -2.0s  infinite linear; }
    .k1  { animation: jkey 2s -1.9s  infinite linear; }
    .k2  { animation: jkey 2s -1.8s  infinite linear; }
    .k3  { animation: jkey 2s -1.7s  infinite linear; }
    .k4  { animation: jkey 2s -1.6s  infinite linear; }
    .k5  { animation: jkey 2s -1.5s  infinite linear; }
    .k6  { animation: jkey 2s -1.4s  infinite linear; }
    .k7  { animation: jkey 2s -1.3s  infinite linear; }
    .k8  { animation: jkey 2s -1.2s  infinite linear; }
    .k9  { animation: jkey 2s -1.1s  infinite linear; }
    .k10 { animation: jkey 2s -1.0s  infinite linear; }
    .k11 { animation: jkey 2s -0.9s  infinite linear; }
    .k12 { animation: jkey 2s -0.8s  infinite linear; }
    .k13 { animation: jkey 2s -0.7s  infinite linear; }
    .k14 { animation: jkey 2s -0.6s  infinite linear; }
    .k15 { animation: jkey 2s -0.5s  infinite linear; }
    .k16 { animation: jkey 2s -0.4s  infinite linear; }
    .k17 { animation: jkey 2s -0.3s  infinite linear; }
    .k18 { animation: jkey 2s -0.2s  infinite linear; }
    .k19 { animation: jkey 2s -0.1s  infinite linear; }
  </style>

  <!-- 20 evenly-spaced keys (every other from original 40), clockwise from top -->
  <g fill="#4fb151">
    <!-- k0: top -->
    <path class="k0" d="M 778.444 82.000 A 13.0 13.0 0 0 1 778.444 108.000 L 721.556 108.000 A 13.0 13.0 0 0 1 721.556 82.000 Z"/>
    <!-- k1: upper-right 1 -->
    <path class="k1" d="M 983.475 123.484 A 13.0 13.0 0 0 1 975.440 148.211 L 921.337 130.632 A 13.0 13.0 0 0 1 929.372 105.905 Z"/>
    <!-- k2: upper-right 2 -->
    <path class="k2" d="M 1165.652 226.295 A 13.0 13.0 0 0 1 1150.369 247.330 L 1104.347 213.892 A 13.0 13.0 0 0 1 1119.629 192.858 Z"/>
    <!-- k3: upper-right 3 -->
    <path class="k3" d="M 1307.142 380.371 A 13.0 13.0 0 0 1 1286.108 395.653 L 1252.670 349.631 A 13.0 13.0 0 0 1 1273.705 334.348 Z"/>
    <!-- k4: right-upper -->
    <path class="k4" d="M 1394.095 570.628 A 13.0 13.0 0 0 1 1369.368 578.663 L 1351.789 524.560 A 13.0 13.0 0 0 1 1376.516 516.525 Z"/>
    <!-- k5: right -->
    <path class="k5" d="M 1418.000 778.444 A 13.0 13.0 0 0 1 1392.000 778.444 L 1392.000 721.556 A 13.0 13.0 0 0 1 1418.000 721.556 Z"/>
    <!-- k6: right-lower -->
    <path class="k6" d="M 1376.516 983.475 A 13.0 13.0 0 0 1 1351.789 975.440 L 1369.368 921.337 A 13.0 13.0 0 0 1 1394.095 929.372 Z"/>
    <!-- k7: lower-right 3 -->
    <path class="k7" d="M 1273.705 1165.652 A 13.0 13.0 0 0 1 1252.670 1150.369 L 1286.108 1104.347 A 13.0 13.0 0 0 1 1307.142 1119.629 Z"/>
    <!-- k8: lower-right 2 -->
    <path class="k8" d="M 1119.629 1307.142 A 13.0 13.0 0 0 1 1104.347 1286.108 L 1150.369 1252.670 A 13.0 13.0 0 0 1 1165.652 1273.705 Z"/>
    <!-- k9: lower-right 1 -->
    <path class="k9" d="M 929.372 1394.095 A 13.0 13.0 0 0 1 921.337 1369.368 L 975.440 1351.789 A 13.0 13.0 0 0 1 983.475 1376.516 Z"/>
    <!-- k10: bottom -->
    <path class="k10" d="M 721.556 1418.000 A 13.0 13.0 0 0 1 721.556 1392.000 L 778.444 1392.000 A 13.0 13.0 0 0 1 778.444 1418.000 Z"/>
    <!-- k11: lower-left 1 -->
    <path class="k11" d="M 516.525 1376.516 A 13.0 13.0 0 0 1 524.560 1351.789 L 578.663 1369.368 A 13.0 13.0 0 0 1 570.628 1394.095 Z"/>
    <!-- k12: lower-left 2 -->
    <path class="k12" d="M 334.348 1273.705 A 13.0 13.0 0 0 1 349.631 1252.670 L 395.653 1286.108 A 13.0 13.0 0 0 1 380.371 1307.142 Z"/>
    <!-- k13: lower-left 3 -->
    <path class="k13" d="M 192.858 1119.629 A 13.0 13.0 0 0 1 213.892 1104.347 L 247.330 1150.369 A 13.0 13.0 0 0 1 226.295 1165.652 Z"/>
    <!-- k14: left-lower -->
    <path class="k14" d="M 105.905 929.372 A 13.0 13.0 0 0 1 130.632 921.337 L 148.211 975.440 A 13.0 13.0 0 0 1 123.484 983.475 Z"/>
    <!-- k15: left -->
    <path class="k15" d="M 82.000 721.556 A 13.0 13.0 0 0 1 108.000 721.556 L 108.000 778.444 A 13.0 13.0 0 0 1 82.000 778.444 Z"/>
    <!-- k16: left-upper -->
    <path class="k16" d="M 123.484 516.525 A 13.0 13.0 0 0 1 148.211 524.560 L 130.632 578.663 A 13.0 13.0 0 0 1 105.905 570.628 Z"/>
    <!-- k17: upper-left 3 -->
    <path class="k17" d="M 226.295 334.348 A 13.0 13.0 0 0 1 247.330 349.631 L 213.892 395.653 A 13.0 13.0 0 0 1 192.858 380.371 Z"/>
    <!-- k18: upper-left 2 -->
    <path class="k18" d="M 380.371 192.858 A 13.0 13.0 0 0 1 395.653 213.892 L 349.631 247.330 A 13.0 13.0 0 0 1 334.348 226.295 Z"/>
    <!-- k19: upper-left 1 -->
    <path class="k19" d="M 570.628 105.905 A 13.0 13.0 0 0 1 578.663 130.632 L 524.560 148.211 A 13.0 13.0 0 0 1 516.525 123.484 Z"/>
  </g>

  <!-- J glyph — solid green only, no fill animation -->
  <g fill="#4fb151" fill-opacity="1">
    <g transform="translate(643.872746, 940.874899)">
      <g>
        <path d="M 134.40625 -448 C 111.46875 -448 92.929688 -454.664062 78.796875 -468 C 64.660156 -481.332031 57.59375 -499.46875 57.59375 -522.40625 C 57.59375 -544.269531 64.660156 -561.867188 78.796875 -575.203125 C 92.929688 -588.535156 111.46875 -595.203125 134.40625 -595.203125 C 157.863281 -595.203125 176.523438 -588.535156 190.390625 -575.203125 C 204.265625 -561.867188 211.203125 -544.269531 211.203125 -522.40625 C 211.203125 -499.46875 204.265625 -481.332031 190.390625 -468 C 176.523438 -454.664062 157.863281 -448 134.40625 -448 Z M 41.59375 204 C 18.132812 204 -5.0625 200.53125 -28 193.59375 L -23.203125 174.40625 C -13.597656 178.132812 -4.53125 180 4 180 C 23.726562 180 37.191406 169.863281 44.390625 149.59375 C 51.597656 129.332031 55.203125 99.46875 55.203125 60 L 55.203125 -328 C 55.203125 -339.726562 51.597656 -348.257812 44.390625 -353.59375 C 37.191406 -358.925781 27.992188 -361.59375 16.796875 -361.59375 L 16.796875 -380.796875 C 34.398438 -381.328125 54.800781 -382.660156 78 -384.796875 C 101.195312 -386.929688 123.863281 -390.128906 146 -394.390625 C 168.132812 -398.660156 186.398438 -404 200.796875 -410.40625 L 209.59375 -405.59375 L 209.59375 28.796875 C 209.59375 87.992188 194.660156 131.992188 164.796875 160.796875 C 134.929688 189.597656 93.863281 204 41.59375 204 Z"/>
      </g>
    </g>
  </g>

</svg>
