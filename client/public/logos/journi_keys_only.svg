    /*
     * 40 keys, 4 purple at a time, clockwise.
     * Each key is purple for the first 10% of a 2s cycle (10% × 40 = 4).
     * Step = 2s / 40 = 0.05s per key.
     */
    @keyframes jkey {
      0%     { fill: #7B71C7; }
      10%    { fill: #7B71C7; }
      10.01% { fill: #4fb151; }
      100%   { fill: #4fb151; }
    }
    .k0  { animation: jkey 2s -2.00s infinite linear; }
    .k1  { animation: jkey 2s -1.95s infinite linear; }
